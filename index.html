<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8">
<title>Teneriffa 2026/2027</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- LIBRARIES -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedcolumns/4.3.0/css/fixedColumns.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedheader/3.4.0/css/fixedHeader.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.colVis.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.datatables.net/fixedcolumns/4.3.0/js/dataTables.fixedColumns.min.js"></script>
<script src="https://cdn.datatables.net/fixedheader/3.4.0/js/dataTables.fixedHeader.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

/* ================= BASIC ================= */

body {
  font-family: Arial;
  margin:15px;
  background:#f2f4f7;
  font-size:13px;
}

/* Header */
.header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:15px;
}

.header h1 {
  margin:0;
  font-size:20px;
  font-weight:600;
}

.subtitle {
  font-size:12px;
  color:#7f8c8d;
}

/* ================= CHIPS ================= */

.toolbar {
  margin-bottom:15px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.chip {
  padding:6px 14px;
  border-radius:20px;
  background:#e3e8ee;
  cursor:pointer;
  transition:0.2s;
}

.chip:hover {
  background:#d5dde6;
}

.chip.active {
  background:#2c3e50;
  color:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

/* ================= TABLE ================= */

.dataTables_scrollBody {
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  scroll-snap-type: x proximity;
}

#golfTable th,
#golfTable td {
  scroll-snap-align: center;
}

  
#golfTable th, #golfTable td {
  border-right:2px solid #d0d7de;
  text-align:center;
}

#golfTable th:last-child,
#golfTable td:last-child {
  border-right:none;
}

#golfTable thead th {
  text-align:center !important;
  vertical-align:middle;
}

/* Hover Effekt */
#golfTable tbody td:hover {
  background:#d6eaff; /* deutlich kräftiger */
  cursor:pointer;
  transition:0.15s;
}

#golfTable tbody td:active {
  background:#bcdfff; /* Klick-Feedback */
}

/* Wochenende */
.weekend td {
  background:#fafafa;
}

.weekend td:first-child {
  font-weight:bold;
}

/* kompakte Spieler-Spalten */
#golfTable th:nth-child(n+7),
#golfTable td:nth-child(n+7) {
  width:50px;
  font-size:11px;
}

/* X als Badge */
.player-x {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#27ae60;
  color:white !important;
  font-size:12px;
  font-weight:bold;
}

/* ================= POPUP ================= */

.popup-overlay {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.4);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  z-index:999;
  animation: fadeIn 0.2s ease;
}

.popup {
  background:#fff;
  width:100%;
  max-height:80%;
  border-radius:16px 16px 0 0;
  padding:20px;
  overflow-y:auto;
  animation: slideUp 0.25s ease;
  box-shadow:0 -5px 30px rgba(0,0,0,0.15);
}

@media (min-width:768px){
  .popup-overlay { align-items:center; }

  .popup {
    width:350px;
    border-radius:12px;
  }
}

.popup h3 {
  margin:0 0 10px 0;
  font-size:18px;
  font-weight:600;
  text-align:center;
}

.popup ul { padding-left:20px; }

.popup-close {
  position:absolute;
  top:10px;
  right:15px;
  font-size:18px;
  cursor:pointer;
}

@keyframes slideUp {
  from { transform:translateY(100%); }
  to { transform:translateY(0); }
}

@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>
    <h1>Teneriffa 2026/2027</h1>
    <div class="subtitle">Tee-Times</div>
  </div>
</div>

<!-- FILTER -->
<div class="toolbar">
  <div class="chip active" data-ort="">Alle</div>
  <div class="chip" data-ort="AM">AM</div>
  <div class="chip" data-ort="DS">DS</div>
  <div class="chip" data-ort="AD">AD</div>
  <div class="chip" data-ort="LA">LA</div>
  <div class="chip" data-ort="BV">BV</div>
  <div class="chip" data-ort="RE">RE</div>
</div>

<table id="golfTable" class="display nowrap" style="width:100%">
<thead></thead>
<tbody></tbody>
</table>

<script>

/* CONFIG */
const CONFIG = {
  csvUrl: "https://dariolorenzon.github.io/Teneriffa/golfplan.csv",
  delimiter: ";",
  columns: { date:0, ort:1, nameStart:6 }
};

/* FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyBl7CqMFZZq0oZkhs8Zzibq_6wiSikAcXE",
  databaseURL: "https://tee-times-teneriffa-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = firebase.database();

let tableInstance;

/* HELPERS */
function parseDate(str){
  const [d,m,y] = str.split(".");
  return new Date(y, m-1, d);
}

function isWeekend(dateStr){
  const day = parseDate(dateStr).getDay();
  return day === 0 || day === 6;
}

function createKey(date, ort){
  const [d,m,y] = date.split(".");
  return `${y}-${m}-${d}_${ort}`;
}

/* POPUP */
function showPlayersPopup(date, rowData, headers){

  const players = [];

  for(let i = CONFIG.columns.nameStart; i < headers.length; i++){
    if(rowData[i] === "x"){
      players.push(headers[i]);
    }
  }

  const overlay = document.createElement("div");
  overlay.className = "popup-overlay";

  const popup = document.createElement("div");
  popup.className = "popup";

  popup.innerHTML = `
    <div class="popup-close">✕</div>
    <h3>${date}</h3>
    ${
      players.length
        ? `<ul>${players.map(p => `<li>${p}</li>`).join("")}</ul>`
        : "<p style='text-align:center;'>Keine Spieler eingetragen</p>"
    }
  `;

  overlay.appendChild(popup);
  document.body.appendChild(overlay);

  overlay.addEventListener("click", (e)=>{
    if(e.target === overlay || e.target.classList.contains("popup-close")){
      overlay.remove();
    }
  });
}

/* CSV */
function loadCsv(cb){
  Papa.parse(CONFIG.csvUrl,{
    download:true,
    delimiter:CONFIG.delimiter,
    complete:r=>{
      const headers=r.data[0];
      let data=r.data.slice(1);
      data=data.map(row=>{
        while(row.length<headers.length) row.push("");
        return row;
      });
      cb(headers,data);
    }
  });
}

/* FIREBASE MERGE */
async function mergeFirebase(data, headers){
  const snap = await db.ref("golfplan").once("value");
  if(!snap.exists()) return data;

  const fb = snap.val();

  return data.map(row=>{
    const key=createKey(row[0],row[1]);
    if(!fb[key]) return row;

    Object.entries(fb[key]).forEach(([player,val])=>{
      const i=headers.indexOf(player);
      if(i!==-1) row[i]=val==="1"?"x":val;
    });

    return row;
  });
}

/* CLICK */
function enableClick(headers){

  $('#golfTable tbody').on('click','td',function(){

    const cell = tableInstance.cell(this);
    const rowIndex = cell.index().row;
    const col = tableInstance.column(this).index();
    const rowData = tableInstance.row(rowIndex).data();

    if(col === CONFIG.columns.date){
      showPlayersPopup(rowData[0], rowData, headers);
      return;
    }

    if(col < CONFIG.columns.nameStart) return;

    const player=headers[col];
    const key=createKey(rowData[0],rowData[1]);

    const newVal = rowData[col]==="x"?"":"x";
    rowData[col]=newVal;

    tableInstance.row(rowIndex).data(rowData).invalidate().draw(false);

    db.ref("golfplan/"+key).update({
      [player]: newVal
    });
  });
}

/* CHIPS */
function initChips(){
  document.querySelectorAll(".chip").forEach(chip=>{
    chip.onclick=()=>{
      document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
      chip.classList.add("active");
      tableInstance.column(CONFIG.columns.ort)
        .search(chip.dataset.ort)
        .draw();
    };
  });
}

/* TABLE */
function initTable(headers,data){

  document.querySelector("#golfTable thead").innerHTML =
    `<tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr>`;

  tableInstance=$("#golfTable").DataTable({

    dom:'Brt',
    paging:false,
    autoWidth:false,
    stateSave:false,

    buttons:[
      { extend:'colvis', text:'Spalten ein/ausblenden' },
      { extend:'excelHtml5', text:'Excel Export' }
    ],

    data:data,
    scrollX:true,
    scrollY:"70vh",
    order:[[CONFIG.columns.date,"asc"]],
    fixedColumns:{ leftColumns:2 },
    fixedHeader:true,

    columnDefs:[

      {
        targets:CONFIG.columns.date,
        render:(data,type)=>{
          if(type==="sort") return parseDate(data).getTime();
          return data;
        }
      },

      {
        targets:index=>index>=CONFIG.columns.nameStart,
        render:(data,type)=>{
          if(type==="display"){
          return data==="x"
            ? '<span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#27ae60;color:#fff;font-size:12px;font-weight:bold;">x</span>'
            : "";
          }
          return data==="x"?"x":"";
        }
      }
    ],

    createdRow:(row,rowData)=>{
      if(isWeekend(rowData[0])) row.classList.add("weekend");
    }

  });

  enableClick(headers);
}

/* START */
document.addEventListener("DOMContentLoaded",()=>{

  loadCsv(async (headers,data)=>{
    const merged=await mergeFirebase(data,headers);
    initTable(headers,merged);
    initChips();
  });

});

</script>

</body>
</html>
