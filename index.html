<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8">
<title>Teneriffa 2026/2027</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedcolumns/4.3.0/css/fixedColumns.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedheader/3.4.0/css/fixedHeader.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.colVis.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.datatables.net/fixedcolumns/4.3.0/js/dataTables.fixedColumns.min.js"></script>
<script src="https://cdn.datatables.net/fixedheader/3.4.0/js/dataTables.fixedHeader.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<!-- 🔥 Firebase (COMPAT VERSION = wichtig!) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; margin:15px; background:#f2f4f7; font-size:13px; }
h1 { font-size:18px; margin-bottom:10px; }

.toolbar { margin-bottom:15px; display:flex; gap:8px; flex-wrap:wrap; }
.chip { padding:6px 14px; border-radius:20px; background:#e3e8ee; cursor:pointer; }
.chip.active { background:#2c3e50; color:#fff; }

div.dt-buttons { display:flex; gap:8px; margin-bottom:10px; }
div.dt-buttons .dt-button {
  padding:6px 14px !important;
  border-radius:20px !important;
  background:#e3e8ee !important;
  border:none !important;
}

#golfTable th, #golfTable td { border-right:1px solid #e6eaef; text-align:center; }
#golfTable th:last-child, #golfTable td:last-child { border-right:none; }
#golfTable tbody td { border-top:1px solid #eef2f6; }

.weekend td:first-child { font-weight:bold; }

#golfTable th:nth-child(n+7),
#golfTable td:nth-child(n+7) {
  width:50px; min-width:50px; max-width:50px; font-size:11px;
}

.player-check {
  transform: scale(1.2);
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Teneriffa 2026/2027</h1>

<div class="toolbar">
  <div class="chip active" data-ort="">Alle</div>
  <div class="chip" data-ort="AM">AM</div>
  <div class="chip" data-ort="DS">DS</div>
  <div class="chip" data-ort="AD">AD</div>
  <div class="chip" data-ort="LA">LA</div>
  <div class="chip" data-ort="BV">BV</div>
  <div class="chip" data-ort="RE">RE</div>
</div>

<table id="golfTable" class="display nowrap" style="width:100%">
  <thead></thead>
  <tbody></tbody>
</table>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyBl7CqMFZZq0oZkhs8Zzibq_6wiSikAcXE",
  authDomain: "tee-times-teneriffa.firebaseapp.com",
  databaseURL: "https://tee-times-teneriffa-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tee-times-teneriffa",
  storageBucket: "tee-times-teneriffa.firebasestorage.app",
  messagingSenderId: "103629641735",
  appId: "1:103629641735:web:f61ea2f1618bd08364b2a2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

console.log("Firebase init ok");

/* ================= CONFIG ================= */

const CONFIG = {
  csvUrl:"https://dariolorenzon.github.io/Teneriffa/golfplan.csv",
  delimiter:";",
  columns:{ date:0, ort:1, nameStart:6 }
};

let tableInstance=null;

/* ================= HELPERS ================= */

function parseDate(d){
  const [day,month,year]=d.split(".");
  return new Date(year,month-1,day);
}

function isWeekend(d){
  const day=parseDate(d).getDay();
  return day===0||day===6;
}

function createSafeKey(date, ort){
  if(!date) return null;
  const [d,m,y]=date.split(".");
  if(!d||!m||!y) return null;
  return `${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}_${ort}`;
}

function buildTableHeader(headers){
  return `<tr>${
    headers.map((h,i)=>{
      if(i>=CONFIG.columns.nameStart && h.includes(" ")){
        const [a,b]=h.split(" ");
        return `<th>${a}<br>${b}</th>`;
      }
      return `<th>${h}</th>`;
    }).join("")
  }</tr>`;
}

/* ================= FIREBASE MERGE ================= */

async function mergeFirebaseData(data, headers){

  const snap = await db.ref("golfplan").once("value");
  console.log("Firebase Snapshot:", snap.val());

  if(!snap.exists()) return data;

  const fb = snap.val();

  return data.map(row=>{
    const key = createSafeKey(row[0],row[1]);
    if(!key) return row;

    if(fb[key]){
      Object.entries(fb[key]).forEach(([player,val])=>{
        const idx = headers.indexOf(player);
        if(idx!==-1) row[idx]=val;
      });
    }
    return row;
  });
}

/* ================= EDIT ================= */

function enableEditing(headers){

  $('#golfTable tbody').on('click','td',function(){

    const cell = tableInstance.cell(this);
    const rowData = tableInstance.row(this).data();

    if(!rowData) return;

    const col = cell.index().column;

    // Nur Namensspalten
    if(col < CONFIG.columns.nameStart) return;

    console.log("CELL CLICKED");

    const player = headers[col];
    const key = createSafeKey(rowData[0], rowData[1]);

    if(!key) return;

    // Toggle Wert
    const current = rowData[col];
    const newVal = current === "1" ? "" : "1";

    rowData[col] = newVal;

    // 🔥 neu rendern
    const rowIndex = cell.index().row;

    tableInstance.row(rowIndex).data(rowData).invalidate().draw(false);

    // 🔥 Firebase speichern
    db.ref("golfplan/"+key).update({
      [player]: newVal
    });

  });

}

/* ================= UI ================= */

function initChips(){
  document.querySelectorAll(".chip").forEach(chip=>{
    chip.onclick=()=>{
      document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
      chip.classList.add("active");
      tableInstance.column(CONFIG.columns.ort)
        .search(chip.dataset.ort)
        .draw();
    };
  });
}

/* ================= CSV ================= */

function loadCsv(cb){
  Papa.parse(CONFIG.csvUrl+"?v="+Date.now(),{
    download:true,
    delimiter:CONFIG.delimiter,
    complete:r=>{
      const headers=r.data[0];
      let data=r.data.slice(1);

      data=data.map(row=>{
        while(row.length<headers.length) row.push("");
        return row;
      });

      cb(headers,data);
    }
  });
}

/* ================= TABLE ================= */

function initTable(headers,data){

  document.querySelector("#golfTable thead").innerHTML=
    buildTableHeader(headers);

  tableInstance=$("#golfTable").DataTable({

    dom:'Brt',
    paging:false,
    autoWidth:false,

    buttons:[
      { extend:'colvis', text:'Spalten ein/ausblenden' },
      {
        extend:'excelHtml5',
        text:'Excel Export',
        filename:()=>"Export_"+new Date().toISOString().slice(0,10),
        exportOptions:{ columns:':visible', modifier:{search:'applied'} }
      }
    ],

    data:data,
    scrollX:true,
    scrollY:"70vh",
    // fixedColumns:{ leftColumns:2 },
    fixedHeader:true,

    columnDefs:[
  {
    targets:index=>index>=CONFIG.columns.nameStart,
    width:"50px",
    render:(data,type)=>{
      if(type==="display"){
        if(data==="1"){
          return '<div style="background:#2ecc71;color:#fff;border-radius:6px;padding:2px;">✔</div>';
        }
        return "";
      }
      return data;
    }
  }
],

  enableEditing(headers);
}

/* ================= START ================= */

document.addEventListener("DOMContentLoaded",()=>{

  loadCsv(async (headers,data)=>{

    const merged=await mergeFirebaseData(data,headers);

    initTable(headers,merged);
    initChips();

  });

});

</script>

</body>
</html>
