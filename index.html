<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8">
<title>Teneriffa 2026/2027</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- LIBRARIES -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedcolumns/4.3.0/css/fixedColumns.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedheader/3.4.0/css/fixedHeader.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.colVis.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.datatables.net/fixedcolumns/4.3.0/js/dataTables.fixedColumns.min.js"></script>
<script src="https://cdn.datatables.net/fixedheader/3.4.0/js/dataTables.fixedHeader.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  font-family: Arial;
  margin:15px;
  background:#f2f4f7;
  font-size:13px;
}

.header {
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}

.toolbar {
  margin-bottom:15px;
  display:flex;
  gap:8px;
}

.chip {
  padding:6px 14px;
  border-radius:20px;
  background:#e3e8ee;
  cursor:pointer;
}
.chip.active {
  background:#2c3e50;
  color:#fff;
}

.player-x {
  display:inline-flex;
  justify-content:center;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#27ae60;
  color:white;
}
</style>
</head>

<body>

<!-- POPUP -->
<div id="userPopup" style="
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
">
  <div style="background:white;padding:20px;border-radius:10px;text-align:center;width:250px;">
    <h3>Dein Kürzel</h3>
    <input id="userInput" placeholder="z.B. AM"
           style="width:100%; padding:8px; margin-top:10px;">
    <br><br>
    <button id="saveUser">Speichern</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <h1>Teneriffa 2026/2027</h1>
</div>

<!-- FILTER -->
<div class="toolbar">
  <div class="chip active" data-ort="">Alle</div>
  <div class="chip" data-ort="AM">AM</div>
  <div class="chip" data-ort="DS">DS</div>
  <div class="chip" data-ort="AD">AD</div>
  <div class="chip" data-ort="LA">LA</div>
  <div class="chip" data-ort="BV">BV</div>
  <div class="chip" data-ort="RE">RE</div>
</div>

<table id="golfTable" class="display nowrap" style="width:100%"></table>

<script>

let currentUserKey = localStorage.getItem("userKey") || "";
let tableInstance;

/* USER FILTER */
function applyUserFilter(){
  if(!tableInstance) return;

  document.querySelectorAll(".chip").forEach(c=>{
    c.classList.remove("active");
    if(c.dataset.ort === currentUserKey){
      c.classList.add("active");
    }
  });

  tableInstance.column(1).search(currentUserKey).draw();
}

function askUserIfNeeded(){
  if(!currentUserKey){
    document.getElementById("userPopup").style.display = "flex";
  }
}

/* CONFIG */
const CONFIG = {
  csvUrl: "https://dariolorenzon.github.io/Teneriffa/golfplan.csv",
  delimiter: ";"
};

/* FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSy...",
  databaseURL: "https://tee-times-teneriffa-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = firebase.database();

/* CSV */
function loadCsv(cb){
  Papa.parse(CONFIG.csvUrl,{
    download:true,
    delimiter:CONFIG.delimiter,
    complete:r=>{
      const headers=r.data[0];
      const data=r.data.slice(1);
      cb(headers,data);
    }
  });
}

/* TABLE */
function initTable(headers,data){
  tableInstance = $("#golfTable").DataTable({
    data:data,
    columns: headers.map(h=>({title:h}))
  });
}

/* START */
document.addEventListener("DOMContentLoaded",()=>{

  document.getElementById("saveUser").onclick = () => {
    const val = document.getElementById("userInput").value.trim();

    if(!val) return alert("Bitte Kürzel eingeben");

    currentUserKey = val;
    localStorage.setItem("userKey", val);

    document.getElementById("userPopup").style.display = "none";

    applyUserFilter();
  };

  loadCsv((headers,data)=>{
    initTable(headers,data);
    askUserIfNeeded();
    applyUserFilter();
  });

});

</script>

</body>
</html>
