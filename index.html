<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8">
<title>Teneriffa 2026/2027</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ==========================================================
   LIBRARIES
   ========================================================== -->

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedcolumns/4.3.0/css/fixedColumns.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedheader/3.4.0/css/fixedHeader.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.colVis.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.datatables.net/fixedcolumns/4.3.0/js/dataTables.fixedColumns.min.js"></script>
<script src="https://cdn.datatables.net/fixedheader/3.4.0/js/dataTables.fixedHeader.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

/* ==========================================================
   BASIC LAYOUT
   ========================================================== */

body {
  font-family: Arial;
  margin:15px;
  background:#f2f4f7;
  font-size:13px;
}

h1 { margin-bottom:10px; }

/* ==========================================================
   FILTER CHIPS
   ========================================================== */

.toolbar {
  margin-bottom:15px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.chip {
  padding:6px 14px;
  border-radius:20px;
  background:#e3e8ee;
  cursor:pointer;
}

.chip.active {
  background:#2c3e50;
  color:#fff;
}

/* ==========================================================
   TABLE STYLING
   ========================================================== */

#golfTable th, #golfTable td {
  border-right:2px solid #d0d7de;
  text-align:center;
}

#golfTable th:last-child,
#golfTable td:last-child {
  border-right:none;
}

#golfTable thead th {
  text-align:center !important;
  vertical-align:middle;
}

.weekend td:first-child {
  font-weight:bold;
}

/* kompakte Spieler-Spalten */
#golfTable th:nth-child(n+7),
#golfTable td:nth-child(n+7) {
  width:50px;
  font-size:11px;
}

/* X Darstellung */
.player-x {
  color:#27ae60 !important;
  font-weight:bold !important;
}

</style>
</head>

<body>

<h1>Teneriffa 2026/2027</h1>

<!-- ==========================================================
   FILTER UI
   ========================================================== -->

<div class="toolbar">
  <div class="chip active" data-ort="">Alle</div>
  <div class="chip" data-ort="AM">AM</div>
  <div class="chip" data-ort="DS">DS</div>
  <div class="chip" data-ort="AD">AD</div>
  <div class="chip" data-ort="LA">LA</div>
  <div class="chip" data-ort="BV">BV</div>
  <div class="chip" data-ort="RE">RE</div>
</div>

<table id="golfTable" class="display nowrap" style="width:100%">
  <thead></thead>
  <tbody></tbody>
</table>

<script>

/* ==========================================================
   CONFIGURATION
   ========================================================== */

const CONFIG = {
  csvUrl: "https://dariolorenzon.github.io/Teneriffa/golfplan.csv",
  delimiter: ";",
  columns: {
    date: 0,
    ort: 1,
    nameStart: 6
  }
};

/* ==========================================================
   FIREBASE INIT
   ========================================================== */

const firebaseConfig = {
  apiKey: "AIzaSyBl7CqMFZZq0oZkhs8Zzibq_6wiSikAcXE",
  databaseURL: "https://tee-times-teneriffa-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let tableInstance;

/* ==========================================================
   HELPER FUNCTIONS
   ========================================================== */

// Datum → Date Objekt
function parseDate(str){
  const [d,m,y] = str.split(".");
  return new Date(y, m-1, d);
}

// Wochenende prüfen
function isWeekend(dateStr){
  const day = parseDate(dateStr).getDay();
  return day === 0 || day === 6;
}

// Firebase Key erstellen
function createKey(date, ort){
  if(!date || !ort) return null;
  const [d,m,y] = date.split(".");
  return `${y}-${m}-${d}_${ort}`;
}

/* ==========================================================
   DATA HANDLING
   ========================================================== */

// CSV laden
function loadCsv(callback){
  Papa.parse(CONFIG.csvUrl, {
    download: true,
    delimiter: CONFIG.delimiter,
    complete: result => {

      const headers = result.data[0];
      let data = result.data.slice(1);

      // Zeilen auffüllen
      data = data.map(row => {
        while(row.length < headers.length) row.push("");
        return row;
      });

      callback(headers, data);
    }
  });
}

// Firebase Daten mergen
async function mergeFirebase(data, headers){

  const snap = await db.ref("golfplan").once("value");
  if(!snap.exists()) return data;

  const fb = snap.val();

  return data.map(row => {

    const key = createKey(row[0], row[1]);
    if(!key || !fb[key]) return row;

    Object.entries(fb[key]).forEach(([player, val]) => {
      const idx = headers.indexOf(player);
      if(idx !== -1){
        row[idx] = val === "1" ? "x" : val;
      }
    });

    return row;
  });
}

/* ==========================================================
   UI / INTERACTIONS
   ========================================================== */

// Klick auf Zelle → Toggle X
function enableClick(headers){

  $('#golfTable tbody').on('click','td',function(){

    const cell = tableInstance.cell(this);
    const rowIndex = cell.index().row;
    const col = tableInstance.column(this).index();

    if(col < CONFIG.columns.nameStart) return;

    const rowData = tableInstance.row(rowIndex).data();

    const player = headers[col];
    const key = createKey(rowData[0], rowData[1]);

    const newVal = rowData[col] === "x" ? "" : "x";
    rowData[col] = newVal;

    tableInstance
      .row(rowIndex)
      .data(rowData)
      .invalidate()
      .draw(false);

    db.ref("golfplan/" + key).update({
      [player]: newVal
    });
  });
}

// Filter Chips
function initChips(){
  document.querySelectorAll(".chip").forEach(chip => {
    chip.onclick = () => {

      document.querySelectorAll(".chip")
        .forEach(c => c.classList.remove("active"));

      chip.classList.add("active");

      tableInstance
        .column(CONFIG.columns.ort)
        .search(chip.dataset.ort)
        .draw();
    };
  });
}

/* ==========================================================
   TABLE INITIALIZATION
   ========================================================== */

function initTable(headers, data){

  // Header bauen
  document.querySelector("#golfTable thead").innerHTML =
    `<tr>${headers.map(h => `<th>${h}</th>`).join("")}</tr>`;

  tableInstance = $("#golfTable").DataTable({

    dom: 'Brt',
    paging: false,
    autoWidth: false,
    stateSave: true,

    buttons: [
      { extend:'colvis', text:'Spalten ein/ausblenden' },
      { extend:'excelHtml5', text:'Excel Export' }
    ],

    data: data,

    scrollX: true,
    scrollY: "70vh",

    order: [[CONFIG.columns.date, "asc"]],

    fixedColumns: { leftColumns: 2 },
    fixedHeader: true,

    columnDefs: [

      // Datum sortieren
      {
        targets: CONFIG.columns.date,
        render: function(data, type){
          if(type === "sort"){
            return parseDate(data).getTime();
          }
          return data;
        }
      },

      // Spieler-Spalten
      {
        targets: index => index >= CONFIG.columns.nameStart,
        render: function(data, type){

          if(type === "display"){
            return data === "x"
              ? '<span class="player-x">x</span>'
              : "";
          }

          return data === "x" ? "x" : "";
        }
      }
    ],

    // Wochenende markieren
    createdRow: (row, rowData) => {
      if(isWeekend(rowData[CONFIG.columns.date])){
        row.classList.add("weekend");
      }
    }
  });

  enableClick(headers);
}

/* ==========================================================
   APP START
   ========================================================== */

document.addEventListener("DOMContentLoaded", () => {

  loadCsv(async (headers, data) => {

    const merged = await mergeFirebase(data, headers);

    initTable(headers, merged);
    initChips();
  });
});

</script>

</body>
</html>
