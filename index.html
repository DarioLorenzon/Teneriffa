<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8">
<title>Teneriffa 2026/2027</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.colVis.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; margin:15px; background:#f2f4f7; font-size:13px; }

.toolbar { margin-bottom:15px; display:flex; gap:8px; flex-wrap:wrap; }
.chip { padding:6px 14px; border-radius:20px; background:#e3e8ee; cursor:pointer; }
.chip.active { background:#2c3e50; color:#fff; }

#golfTable th, #golfTable td { border-right:1px solid #e6eaef; text-align:center; }
#golfTable th:last-child, #golfTable td:last-child { border-right:none; }
#golfTable tbody td { border-top:1px solid #eef2f6; }

.weekend td:first-child { font-weight:bold; }

/* grüne aktive Zellen */
.player-active {
  background:#2ecc71 !important;
}

/* Hover nice UX */
.player-cell:hover {
  background:#d5f5e3;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Teneriffa 2026/2027</h1>

<div class="toolbar">
  <div class="chip active" data-ort="">Alle</div>
  <div class="chip" data-ort="AM">AM</div>
  <div class="chip" data-ort="DS">DS</div>
  <div class="chip" data-ort="AD">AD</div>
</div>

<table id="golfTable" class="display nowrap" style="width:100%">
  <thead></thead>
  <tbody></tbody>
</table>

<script>

/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyBl7...",
  databaseURL: "https://tee-times-teneriffa-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= CONFIG ================= */

const CONFIG = {
  csvUrl:"https://dariolorenzon.github.io/Teneriffa/golfplan.csv",
  delimiter:";",
  columns:{ date:0, ort:1, nameStart:6 }
};

let tableInstance;

/* ================= HELPERS ================= */

function parseDate(d){
  const [day,month,year]=d.split(".");
  return new Date(year,month-1,day);
}

function isWeekend(d){
  const day=parseDate(d).getDay();
  return day===0||day===6;
}

function createSafeKey(date, ort){
  const [d,m,y]=date.split(".");
  return `${y}-${m}-${d}_${ort}`;
}

function buildTableHeader(headers){
  return `<tr>${
    headers.map(h=>`<th>${h}</th>`).join("")
  }</tr>`;
}

/* ================= FIREBASE ================= */

async function mergeFirebaseData(data, headers){

  const snap = await db.ref("golfplan").once("value");

  if(!snap.exists()) return data;

  const fb = snap.val();

  return data.map(row=>{
    const key = createSafeKey(row[0],row[1]);

    if(fb[key]){
      Object.entries(fb[key]).forEach(([player,val])=>{
        const idx = headers.indexOf(player);
        if(idx!==-1) row[idx]=val;
      });
    }
    return row;
  });
}

/* ================= EDIT ================= */

function enableEditing(headers){

  $('#golfTable tbody').on('click','td',function(){

    const cell = tableInstance.cell(this);
    const rowData = tableInstance.row(this).data();
    const col = cell.index().column;

    if(col < CONFIG.columns.nameStart) return;

    const player = headers[col];
    const key = createSafeKey(rowData[0], rowData[1]);

    const newVal = rowData[col] === "1" ? "" : "1";

    rowData[col] = newVal;

    // Update Tabelle
    tableInstance.row(cell.index().row).data(rowData).draw(false);

    // Farbe direkt setzen
    if(newVal === "1"){
      $(this).addClass("player-active");
    } else {
      $(this).removeClass("player-active");
    }

    // Firebase speichern
    db.ref("golfplan/"+key).update({
      [player]: newVal
    });

  });
}

/* ================= CSV ================= */

function loadCsv(cb){
  Papa.parse(CONFIG.csvUrl,{
    download:true,
    delimiter:CONFIG.delimiter,
    complete:r=>{
      const headers=r.data[0];
      let data=r.data.slice(1);

      data=data.map(row=>{
        while(row.length<headers.length) row.push("");
        return row;
      });

      cb(headers,data);
    }
  });
}

/* ================= TABLE ================= */

function initTable(headers,data){

  document.querySelector("#golfTable thead").innerHTML =
    buildTableHeader(headers);

  tableInstance=$("#golfTable").DataTable({

    data:data,
    paging:false,

    columnDefs:[
      {
        targets:index=>index>=CONFIG.columns.nameStart,
        className:"player-cell",
        render:(data,type)=>{
          if(type==="display") return "";
          return data;
        }
      }
    ],

    createdRow:(row,rowData)=>{

      if(isWeekend(rowData[0])){
        row.classList.add("weekend");
      }

      $('td', row).each(function(i){
        if(i >= CONFIG.columns.nameStart && rowData[i] === "1"){
          $(this).addClass("player-active");
        }
      });

    }

  });

  enableEditing(headers);
}

/* ================= START ================= */

document.addEventListener("DOMContentLoaded",()=>{

  loadCsv(async (headers,data)=>{

    const merged=await mergeFirebaseData(data,headers);

    initTable(headers,merged);

  });

});

</script>

</body>
</html>
