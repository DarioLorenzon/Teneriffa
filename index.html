<!DOCTYPE html>
<html lang="de-CH">
<head>
<meta charset="UTF-8">
<title>Teneriffa 2026/2027</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- LIBRARIES -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedcolumns/4.3.0/css/fixedColumns.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/fixedheader/3.4.0/css/fixedHeader.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.colVis.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.datatables.net/fixedcolumns/4.3.0/js/dataTables.fixedColumns.min.js"></script>
<script src="https://cdn.datatables.net/fixedheader/3.4.0/js/dataTables.fixedHeader.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
body { font-family: Arial; margin:15px; background:#f2f4f7; font-size:13px; }
.header { display:flex; justify-content:space-between; margin-bottom:15px; }
.header h1 { margin:0; font-size:20px; }
.subtitle { font-size:12px; color:#7f8c8d; }

.toolbar { margin-bottom:15px; display:flex; flex-wrap:wrap; gap:8px; }

.chip {
  padding:6px 14px;
  border-radius:20px;
  background:#e3e8ee;
  cursor:pointer;
}
.chip.active { background:#2c3e50; color:#fff; }

#golfTable th, #golfTable td {
  border-right:2px solid #d0d7de;
  text-align:center;
}
.player-x {
  display:inline-flex;
  justify-content:center;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#27ae60;
  color:white;
  font-size:12px;
}
</style>
</head>

<body>

<div class="header">
  <div>
    <h1>Teneriffa 2026/2027</h1>
    <div class="subtitle">Tee Times</div>
  </div>
</div>

<div class="toolbar">
  <div class="chip active" data-ort="">Alle</div>
  <div class="chip" data-ort="AM">AM</div>
  <div class="chip" data-ort="DS">DS</div>
  <div class="chip" data-ort="AD">AD</div>
  <div class="chip" data-ort="LA">LA</div>
  <div class="chip" data-ort="BV">BV</div>
  <div class="chip" data-ort="RE">RE</div>
</div>

<table id="golfTable" class="display nowrap" style="width:100%">
<thead></thead>
<tbody></tbody>
</table>

<script>

const CONFIG = {
  csvUrl: "https://dariolorenzon.github.io/Teneriffa/golfplan.csv",
  delimiter: ";",
  columns: { date:0, ort:1, nameStart:6 }
};

firebase.initializeApp({
  apiKey: "AIzaSyBl7CqMFZZq0oZkhs8Zzibq_6wiSikAcXE",
  databaseURL: "https://tee-times-teneriffa-default-rtdb.europe-west1.firebasedatabase.app"
});

const db = firebase.database();
const auth = firebase.auth();
let currentUser = null;

auth.signInAnonymously();

auth.onAuthStateChanged(async (user)=>{
  if(!user) return;
  currentUser = user;

  const snap = await db.ref("filters/" + user.uid).once("value");

  if(snap.exists()){
    const ort = snap.val().ort || "";

    document.querySelectorAll(".chip").forEach(c=>{
      c.classList.remove("active");
      if(c.dataset.ort === ort) c.classList.add("active");
    });

    if(tableInstance){
      tableInstance.column(CONFIG.columns.ort).search(ort).draw();
    }
  }
});

let tableInstance;

function loadCsv(cb){
  Papa.parse(CONFIG.csvUrl,{
    download:true,
    delimiter:CONFIG.delimiter,
    complete:r=>{
      const headers=r.data[0];
      const data=r.data.slice(1);
      cb(headers,data);
    }
  });
}

async function mergeFirebase(data, headers){
  const snap = await db.ref("golfplan").once("value");
  if(!snap.exists()) return data;
  const fb = snap.val();

  return data.map(row=>{
    const key = row[0]+"_"+row[1];
    if(!fb[key]) return row;

    Object.entries(fb[key]).forEach(([p,v])=>{
      const i=headers.indexOf(p);
      if(i!==-1) row[i]=v==="1"?"x":v;
    });
    return row;
  });
}

function initChips(){
  document.querySelectorAll(".chip").forEach(chip=>{
    chip.onclick=()=>{

      document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
      chip.classList.add("active");

      const ort = chip.dataset.ort;

      tableInstance.column(CONFIG.columns.ort).search(ort).draw();

      if(currentUser){
        db.ref("filters/"+currentUser.uid).set({ ort: ort });
      }
    };
  });
}

function initTable(headers,data){

  document.querySelector("#golfTable thead").innerHTML =
    `<tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr>`;

  tableInstance=$("#golfTable").DataTable({
    dom:'<"top-buttons"B>rt',
    paging:false,
    stateSave:true,
    buttons:[
      { extend:'colvis', text:'Spalten ein/ausblenden' },
      { extend:'excelHtml5', text:'Excel Export' }
    ],
    data:data,
    scrollX:true,
    order:[[0,"asc"]],
    columnDefs:[
      {
        targets:i=>i>=CONFIG.columns.nameStart,
        render:(d)=> d==="x" ? '<span class="player-x">x</span>' : ""
      }
    ]
  });

  initChips();
}

document.addEventListener("DOMContentLoaded",()=>{
  loadCsv(async (headers,data)=>{
    const merged = await mergeFirebase(data,headers);
    initTable(headers,merged);
  });
});

</script>

</body>
</html>
